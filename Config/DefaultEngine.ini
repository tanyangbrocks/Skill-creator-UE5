[/Script/Engine.RendererSettings]
r.AllowStaticLighting=False

r.GenerateMeshDistanceFields=True

; 2026-06-22 降級：原本 Lumen(1)/RayTracing/VirtualShadowMaps 全開的「高端」預設，
; 在使用者的硬體（Intel 內顯，128MB 專用顯存）上完全跑不動——log 裡灌滿
; "LogRealtimeMesh: Warning: Unable to create ray tracing accelleration structures"
; （每個 RealtimeMeshComponent 動態生成的 voxel chunk mesh 都建不出 RT 加速結構，
; 不斷重試失敗），這正是「遊戲嚴重卡頓/卡死」的根因；另外 Lumen+VirtualShadowMap
; 在大片完全平坦、無貼圖細節的 voxel 地表上會出現棋盤格 shadow map 分頁 artifact，
; 這也是「世界格子狀明顯」這個回報的根因之一。全部降回傳統管線（無 RT、無 Lumen、
; 一般 shadow map），犧牲一些視覺效果換取這張顯卡能正常跑。
r.DynamicGlobalIlluminationMethod=0

r.ReflectionMethod=0

r.SkinCache.CompileShaders=True

r.RayTracing=False

r.RayTracing.RayTracingProxies.ProjectEnabled=False

r.Substrate=True

r.Substrate.ProjectGBufferFormat=0

r.Shadow.Virtual.Enable=0

r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True

r.DefaultFeature.LocalExposure.HighlightContrastScale=0.8

r.DefaultFeature.LocalExposure.ShadowContrastScale=0.8

